name: validate-terraform-dev

"on":
  workflow_dispatch:
  pull_request:
    paths:
      - "starter-kit/terraform/**/*.tf"
      - "starter-kit/terraform/**/*.tfvars.example"
      - ".github/workflows/validate-terraform-dev.yml"
      - ".github/workflows/deploy-terraform-dev.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan-dev:
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        shell: bash
        working-directory: starter-kit/terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Resolve AWS account ID
        id: aws_identity
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Create terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          aws_region    = "${{ vars.AWS_REGION }}"
          platform_name = "${{ vars.PLATFORM_NAME }}"
          environment   = "dev"
          account_id    = "${{ steps.aws_identity.outputs.account_id }}"
          owner         = "${{ vars.PLATFORM_OWNER }}"
          cost_center   = "${{ vars.COST_CENTER }}"
          extra_tags = {
            repository = "${{ github.repository }}"
            managed_by = "github-actions"
            purpose    = "starter-kit-validation"
          }
          EOF

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -input=false -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('starter-kit/terraform/environments/dev/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n\n... output truncated' : plan;
            const body = `### Terraform plan -- dev\n\`\`\`\n${truncated}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
