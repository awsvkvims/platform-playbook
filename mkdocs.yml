site_name: Platform Playbook
site_description: A platform engineering playbook and enterprise DevOps starter kit for teams building Internal Developer Platforms on AWS.
site_url: https://awsvkvims.github.io/platform-playbook
repo_url: https://github.com/awsvkvims/platform-playbook
repo_name: awsvkvims/platform-playbook

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
    - content.action.view
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Strategy:
      - Platform Vision: platform-vision.md
      - Why Platforms Fail: why-platforms-fail.md
      - Three Stage Strategy: three-stage-platform-strategy.md
  - Stage 1 -- Bootstrap:
      - Bootstrap and Visibility: stage-1-bootstrap-visibility.md
  - Stage 2 -- Co-create:
      - Pilot Co-creation: stage-2-pilot-co-creation.md
  - Stage 3 -- Golden Path:
      - Golden Path and Self-service: stage-3-golden-path-self-service.md
  - Team and Operating Model:
      - Team Design: team-design-and-operating-model.md
  - Technical Platform:
      - Toolchain Architecture: platform-toolchain-architecture.md
      - Backstage IDP: backstage-idp.md
      - Feature Management: feature-management-progressive-delivery.md
  - Governance and Reliability:
      - Governance, Security, Compliance: governance-security-compliance.md
      - Reliability, SLI and SLO: reliability-sli-slo.md
  - Outcomes:
      - Metrics and Adoption: metrics-and-adoption.md
      - Launch Roadmap 30-60-90: launch-roadmap-30-60-90.md
  - Starter Kit:
      - Overview: enterprise-platform-starter.md

