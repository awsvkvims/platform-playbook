name: deploy-dev

"on":
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to dev
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Deploying $REGISTRY/$REPOSITORY:$IMAGE_TAG to dev"
          # Replace this block with your deployment command.
          # Examples:
          #   kubectl set image deployment/my-service my-service=$REGISTRY/$REPOSITORY:$IMAGE_TAG
          #   aws ecs update-service --cluster dev --service my-service --force-new-deployment

      - name: Verify deployment
        run: |
          echo "Add a health check or smoke test here"
          # Example: curl --fail https://my-service.dev.internal/healthz
